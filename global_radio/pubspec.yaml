name: global_radio
description: "Global Radio — personalized, legally-safe audio interest radio for India."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Audio engine + background playback + lock-screen controls
  just_audio: ^0.9.46
  audio_service: ^0.18.15

  # State management
  flutter_riverpod: ^2.6.1

  # Local storage (NoSQL, no codegen — stores JSON maps)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # HTTP + audio pre-fetch / caching
  dio: ^5.7.0
  flutter_cache_manager: ^3.4.1

  # Typography (Noto Sans renders all 22 Indian scripts)
  google_fonts: ^6.2.1

  # Navigation
  go_router: ^14.6.2

  # i18n
  intl: ^0.20.2

  # Auth (Phase B). Active only when built with --dart-define=USE_FIREBASE_AUTH=true;
  # otherwise DevAuthService is used and these stay dormant. Requires a Firebase
  # project + native config from `flutterfire configure` (see tools/setup_firebase.sh).
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^8.1.0

  # Daily-astrology push. Active only with --dart-define=USE_PUSH=true (needs the
  # same Firebase config as auth). Otherwise NoopPushService is used and this
  # stays dormant. Server side: tools/astrology_cron.py --notify + notify_fcm.py.
  firebase_messaging: ^16.0.1

  # Analytics. Active only with --dart-define=USE_ANALYTICS=true.
  # Otherwise DebugAnalyticsService is used.
  firebase_analytics: ^12.4.3

  # Crash reporting. Active only with --dart-define=USE_CRASHLYTICS=true.
  # Otherwise DebugCrashService is used.
  firebase_crashlytics: ^5.2.4

  # Remote config for feature flags, force update, etc.
  firebase_remote_config: ^6.0.2

  # In-app purchases (iOS/Android store billing)
  in_app_purchase: ^3.2.0

  # Deep linking
  app_links: ^6.3.3

  # App version checking
  package_info_plus: ^8.1.3

  # Share & referral
  share_plus: ^10.0.0

  # URL launcher for external links (ads, legal docs, email)
  url_launcher: ^6.3.0

  # Network connectivity detection (for smart downloads)
  connectivity_plus: ^6.0.0

  # Path provider for temp file operations
  path_provider: ^2.1.0

  # Secure storage (for parental controls PIN)
  flutter_secure_storage: ^9.2.0

  # Voice search (on-device speech recognition)
  speech_to_text: ^7.0.0

  # NOTE: Payments (razorpay_flutter / in_app_purchase) are intentionally NOT
  # added yet — they need store accounts and are stubbed behind
  # lib/data/services/payment_service.dart. See SETUP.md "Cloud wiring".

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter
  mocktail: ^1.0.4
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/catalog/
    - assets/audio/demo/english/
    - assets/audio/demo/hindi/
    - assets/splash/

flutter_native_splash:
  color: "#14110E"
  image: assets/splash/logo_mark.png
  android_12:
    color: "#14110E"
    image: assets/splash/logo_mark.png
  ios: true
  web: false
